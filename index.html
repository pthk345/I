<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Вопрос дня</title>
  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%D0%92%D0%BE%D0%BF%D1%80%D0%BE%D1%81%20%D0%B4%D0%BD%D1%8F%22%2C%22short_name%22%3A%22%D0%92%D0%BE%D0%BF%D1%80%D0%BE%D1%81%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22theme_color%22%3A%22%23111111%22%2C%22start_url%22%3A%22.%2F%22%7D" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Вопрос" />
  <link id="apple-touch-icon" rel="apple-touch-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; -webkit-font-smoothing: antialiased; }
    textarea, input { -webkit-appearance: none; appearance: none; }

    @keyframes charEnter {
      0%   { transform: translateY(-18px); opacity: 0; }
      60%  { opacity: 1; }
      100% { transform: translateY(0px); opacity: 1; }
    }
    @keyframes charExit {
      0%   { transform: translateY(0px); opacity: 1; }
      100% { transform: translateY(12px); opacity: 0; }
    }
    @keyframes appIn {
      from { opacity: 0; filter: blur(8px); }
      to   { opacity: 1; filter: blur(0px); }
    }
    #root { animation: appIn 0.5s ease both; }
  </style>

</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const QUESTIONS = [
      "За что ты благодарен вчерашнему дню?",
      "Какую ошибку ты больше не повторишь?",
      "Что бы ты посоветовал себе три года назад?",
      "Какой момент из прошлого ты чаще всего вспоминаешь — и почему?",
      "Что ты простил себе, но ещё не отпустил?",
      "Где ты хочешь оказаться через пять лет?",
      "Что ты сегодня сделаешь для будущего себя?",
      "Какую привычку ты хочешь внедрить следующей?",
      "Чего ты боишься больше всего прямо сейчас?",
      "Что бы ты сделал, если бы знал, что не провалишься?",
      "Что заставило тебя улыбнуться сегодня?",
      "Когда ты в последний раз чувствовал настоящую гордость?",
      "Что тебя по-настоящему заряжает энергией?",
      "Чем ты гордишься, но редко говоришь об этом?",
      "Что тебя тревожит прямо сейчас — и насколько это важно?",
      "Если бы у тебя был лишний час в сутках — на что бы ты его потратил?",
      "Какую одну суперспособность ты бы выбрал — и зачем?",
      "Если бы деньги не имели значения, чем бы ты занимался?",
      "Куда бы ты уехал прямо сейчас, если бы мог?",
      "Ты живёшь или просто существуешь?",
      "Какой момент сегодня был настоящим?",
      "Что тебе мешает быть собой?",
      "Кому ты давно должен был написать?",
      "От чего тебе стоит отказаться, чтобы двигаться вперёд?",
      "Какую одну вещь ты хочешь изменить в себе?",
      "Когда ты последний раз делал что-то впервые?",
      "Что ты откладываешь уже слишком долго?",
      "Что ты хочешь помнить через год?",
      "Чему тебя научил последний провал?",
      "Что бы ты сделал иначе, если бы начинал заново?",
    ];

    const WORDS = { question: "Вопрос", habit: "Привычка", archive: "Архив" };
    const TAB_TITLES = { question: "Вопрос дня", habit: "Привычка", archive: "Архив" };
    const TAB_ORDER = ["question", "habit", "archive"];
    const STAGGER_EXIT = 18, STAGGER_ENTER = 28, EXIT_DUR = 250;

    function getDayOfYear() {
      const now = new Date();
      return Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    }
    function getTodayKey() { return new Date().toISOString().slice(0, 10); }
    function getTodayQuestion() { return QUESTIONS[getDayOfYear() % QUESTIONS.length]; }
    function formatDate() {
      return new Date().toLocaleDateString("ru-RU", { weekday: "long", day: "numeric", month: "long" });
    }
    function streakWord(n) {
      if (n === 1) return "день подряд";
      if (n >= 2 && n <= 4) return "дня подряд";
      return "дней подряд";
    }
    // Safe storage — falls back to in-memory if localStorage is blocked
    const memStore = {};
    function load(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v !== null ? JSON.parse(v) : fallback;
      } catch {
        return key in memStore ? memStore[key] : fallback;
      }
    }
    function save(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); }
      catch { memStore[key] = value; }
    }

    // ── WordToggle ──────────────────────────────────────────
    function WordToggle({ tab, onSwitch }) {
      const [chars, setChars] = useState([]);
      const [busy, setBusy] = useState(false);
      const tabRef = useRef(tab);

      useEffect(() => {
        const w = WORDS[tab];
        setChars([...w].map((ch, i) => ({ ch, key: `${tab}-${i}`, state: "idle", delay: 0 })));
        tabRef.current = tab;
      }, []);

      function handleClick() {
        if (busy) return;
        setBusy(true);
        const cur = WORDS[tabRef.current];
        const nextTab = TAB_ORDER[(TAB_ORDER.indexOf(tabRef.current) + 1) % TAB_ORDER.length];
        const nxt = WORDS[nextTab];

        setChars([...cur].map((ch, i) => ({
          ch, key: `exit-${i}`, state: "exit",
          delay: (cur.length - 1 - i) * STAGGER_EXIT,
        })));

        const exitTotal = EXIT_DUR + cur.length * STAGGER_EXIT;
        setTimeout(() => {
          tabRef.current = nextTab;
          onSwitch(nextTab);
          setChars([...nxt].map((ch, i) => ({
            ch, key: `enter-${nextTab}-${i}`, state: "enter", delay: i * STAGGER_ENTER,
          })));
          setTimeout(() => setBusy(false), nxt.length * STAGGER_ENTER + 450);
        }, exitTotal * 0.55);
      }

      return (
        <button onClick={handleClick} style={{
          background: "none", border: "none",
          cursor: busy ? "default" : "pointer",
          padding: "0 0 2px 0",
          display: "inline-flex", alignItems: "flex-end", lineHeight: 1,
          borderBottom: "2px solid #111",
        }}>
          {chars.map(({ ch, key, state, delay }) => (
            <span key={key} style={{
              fontFamily: "'Syne', sans-serif", fontSize: "22px", fontWeight: 800,
              color: "#111", letterSpacing: "-0.01em", display: "inline-block",
              animation:
                state === "enter" ? `charEnter 0.45s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms both`
                : state === "exit"  ? `charExit 0.25s cubic-bezier(0.55,0,1,0.45) ${delay}ms both`
                : "none",
            }}>{ch === " " ? "\u00A0" : ch}</span>
          ))}
        </button>
      );
    }

    // ── App ─────────────────────────────────────────────────
    function App() {
      const todayKey = getTodayKey();
      const question = getTodayQuestion();

      const [tab,          setTab]          = useState(() => load("tab", "question"));
      const [visibleTab,   setVisibleTab]   = useState(() => load("tab", "question"));
      const [blurring,     setBlurring]     = useState(false);
      const [answer,       setAnswer]       = useState(() => load(`answer-${todayKey}`, ""));
      const [saved,        setSaved]        = useState(() => !!load(`saved-${todayKey}`, false));
      const [habitName,    setHabitName]    = useState(() => load("habitName", ""));
      const [editingHabit, setEditingHabit] = useState(false);
      const [tempHabit,    setTempHabit]    = useState("");
      const [streak,       setStreak]       = useState(() => load("streak", []));
      const [checkedToday, setCheckedToday] = useState(() => load("streak", []).includes(todayKey));
      const [archive,      setArchive]      = useState(() => load("archive", []));

      useEffect(() => save("tab", tab), [tab]);
      useEffect(() => save(`answer-${todayKey}`, answer), [answer]);
      useEffect(() => save(`saved-${todayKey}`, saved), [saved]);
      useEffect(() => save("habitName", habitName), [habitName]);
      useEffect(() => save("streak", streak), [streak]);
      useEffect(() => save("archive", archive), [archive]);

      function handleSwitch(nextTab) {
        setTab(nextTab);
        setBlurring(true);
        setTimeout(() => {
          setVisibleTab(nextTab);
          setBlurring(false);
        }, 420);
      }

      function saveAnswer() {
        if (!answer.trim()) return;
        setSaved(true);
        const alreadySaved = archive.some(e => e.date === todayKey);
        if (!alreadySaved) {
          setArchive(prev => [{ date: todayKey, question, answer: answer.trim() }, ...prev]);
        }
      }
      function saveHabitName() {
        if (!tempHabit.trim()) return;
        setHabitName(tempHabit.trim());
        setEditingHabit(false);
      }
      function toggleToday() {
        const next = streak.includes(todayKey)
          ? streak.filter(d => d !== todayKey)
          : [...streak, todayKey];
        setStreak(next);
        setCheckedToday(!checkedToday);
      }
      function getLast30Days() {
        const days = [];
        for (let i = 29; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const key = d.toISOString().slice(0, 10);
          days.push({ key, done: streak.includes(key), isToday: key === todayKey });
        }
        return days;
      }
      function getCurrentStreak() {
        let count = 0; const d = new Date();
        if (!streak.includes(d.toISOString().slice(0, 10))) d.setDate(d.getDate() - 1);
        while (true) {
          const key = d.toISOString().slice(0, 10);
          if (streak.includes(key)) { count++; d.setDate(d.getDate() - 1); } else break;
        }
        return count;
      }

      const days = getLast30Days();
      const currentStreak = getCurrentStreak();

      const TRANSITION = "opacity 0.18s ease, filter 0.18s ease";

      const s = {
        app:              { fontFamily: "Arial, sans-serif", minHeight: "100dvh", backgroundColor: "#fff", display: "flex", justifyContent: "center", padding: "0 20px env(safe-area-inset-bottom, 60px)" },
        inner:            { width: "100%", maxWidth: "440px" },
        header:           { padding: "52px 0 24px", marginBottom: "32px" },
        headerTop:        { display: "flex", justifyContent: "space-between", alignItems: "flex-end" },
        dateLabel:        { fontSize: "12px", color: "#999", marginBottom: "6px" },
        headerTitle:      { fontSize: "22px", fontWeight: "bold", color: "#111", transition: "opacity 0.45s cubic-bezier(0.4,0,0.2,1), filter 0.45s cubic-bezier(0.4,0,0.2,1)", opacity: blurring ? 0 : 1, filter: blurring ? "blur(16px)" : "blur(0px)" },
        content:          { transition: "opacity 0.45s cubic-bezier(0.4,0,0.2,1), filter 0.45s cubic-bezier(0.4,0,0.2,1), transform 0.45s cubic-bezier(0.4,0,0.2,1)", opacity: blurring ? 0 : 1, filter: blurring ? "blur(20px)" : "blur(0px)", transform: blurring ? "scale(0.97)" : "scale(1)" },
        questionText:     { fontSize: "20px", fontWeight: "bold", color: "#111", lineHeight: "1.5", marginBottom: "20px" },
        textarea:         { fontFamily: "Arial, sans-serif", width: "100%", minHeight: "140px", border: "none", borderRadius: "0", padding: "0", fontSize: "15px", color: "#111", lineHeight: "1.6", resize: "none", outline: "none", backgroundColor: "transparent", marginBottom: "12px" },
        savedText:        { fontSize: "15px", color: "#111", lineHeight: "1.6", marginBottom: "12px", whiteSpace: "pre-wrap" },
        btnPrimary:   (d) => ({ fontFamily: "Arial, sans-serif", fontSize: "15px", fontWeight: "normal", padding: "0", backgroundColor: "transparent", color: d ? "#ccc" : "#111", border: "none", borderBottom: `1px solid ${d ? "#ccc" : "#111"}`, borderRadius: "0", cursor: d ? "default" : "pointer" }),
        btnGhost:         { fontFamily: "Arial, sans-serif", fontSize: "13px", background: "none", border: "none", cursor: "pointer", color: "#888", padding: "0" },
        actionRow:        { display: "flex", alignItems: "center", gap: "8px", marginTop: "4px" },
        habitSetupLabel:  { fontSize: "13px", color: "#999", marginBottom: "10px" },
        habitInput:       { fontFamily: "Arial, sans-serif", width: "100%", border: "1px solid #ddd", borderRadius: "8px", backgroundColor: "#fafafa", fontSize: "18px", color: "#111", padding: "10px 12px", outline: "none", marginBottom: "16px" },
        habitHeader:      { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "28px" },
        habitNameDisplay: { fontSize: "20px", fontWeight: "bold", color: "#111", marginBottom: "4px" },
        streakLabel:      { fontSize: "13px", color: "#999" },
        checkBtn:     (c) => ({ width: "50px", height: "50px", borderRadius: "50%", border: c ? "none" : "2px solid #ccc", backgroundColor: c ? "#111" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s cubic-bezier(0.34,1.56,0.64,1)" }),
        gridLabel:        { fontSize: "12px", color: "#999", marginBottom: "10px" },
        daysGrid:         { display: "grid", gridTemplateColumns: "repeat(10, 1fr)", gap: "5px", marginBottom: "6px" },
        dayCell:  (d, t) => ({ aspectRatio: "1", borderRadius: "4px", backgroundColor: d ? "#111" : "#eee", boxShadow: t && !d ? "inset 0 0 0 2px #aaa" : "none", transition: "background-color 0.2s ease" }),
        gridEdgeLabels:   { display: "flex", justifyContent: "space-between", marginBottom: "28px" },
        gridEdgeLabel:    { fontSize: "11px", color: "#bbb" },
        archiveEmpty:     { fontSize: "15px", color: "#bbb", marginTop: "8px" },
        archiveEntry:     { borderBottom: "1px solid #f0f0f0", paddingBottom: "24px", marginBottom: "24px" },
        archiveDate:      { fontSize: "12px", color: "#999", marginBottom: "6px" },
        archiveQuestion:  { fontSize: "14px", fontWeight: "bold", color: "#111", lineHeight: "1.5", marginBottom: "8px" },
        archiveAnswer:    { fontSize: "15px", color: "#444", lineHeight: "1.6", whiteSpace: "pre-wrap" },
      };

      const titleText = visibleTab === "habit" && habitName ? habitName : TAB_TITLES[visibleTab];

      return (
        <div style={s.app}>
          <div style={s.inner}>
            <div style={s.header}>
              <div style={s.headerTop}>
                <div>
                  <div style={s.dateLabel}>{formatDate()}</div>
                  <div style={s.headerTitle}>{titleText}</div>
                </div>
                <WordToggle tab={tab} onSwitch={handleSwitch} />
              </div>
            </div>

            <div style={s.content}>
              {visibleTab === "question" && (
                <div>
                  <div style={s.questionText}>{question}</div>
                  {saved ? (
                    <div style={s.savedText}>{answer}</div>
                  ) : (
                    <>
                      <textarea style={s.textarea} value={answer} onChange={e => setAnswer(e.target.value)} placeholder="Твой ответ…" />
                      <div style={s.actionRow}>
                        <button style={s.btnPrimary(!answer.trim())} onClick={saveAnswer} disabled={!answer.trim()}>Сохранить</button>
                      </div>
                    </>
                  )}
                </div>
              )}

              {visibleTab === "habit" && (
                <div>
                  {!habitName || editingHabit ? (
                    <div>
                      <div style={s.habitSetupLabel}>Назови свою привычку</div>
                      <input
                        style={s.habitInput} type="text"
                        value={editingHabit ? tempHabit : ""}
                        onChange={e => setTempHabit(e.target.value)}
                        onFocus={() => { if (!editingHabit) { setEditingHabit(true); setTempHabit(habitName); } }}
                        onKeyDown={e => e.key === "Enter" && saveHabitName()}
                        placeholder="например: медитировать" autoFocus
                      />
                      <div style={s.actionRow}>
                        <button style={s.btnPrimary(!tempHabit.trim())} onClick={saveHabitName} disabled={!tempHabit.trim()}>Готово</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={s.habitHeader}>
                        <div>
                          <div style={s.habitNameDisplay}>{habitName}</div>
                          <div style={s.streakLabel}>{currentStreak > 0 ? `${currentStreak} ${streakWord(currentStreak)}` : "начни сегодня"}</div>
                        </div>
                        <button style={s.checkBtn(checkedToday)} onClick={toggleToday}>
                          {checkedToday && (
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                              <path d="M4 10L8.5 14.5L16 6" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                          )}
                        </button>
                      </div>
                      <div style={s.gridLabel}>30 дней</div>
                      <div style={s.daysGrid}>
                        {days.map(({ key, done, isToday }) => <div key={key} style={s.dayCell(done, isToday)} />)}
                      </div>
                      <div style={s.gridEdgeLabels}>
                        <span style={s.gridEdgeLabel}>30 дней назад</span>
                        <span style={s.gridEdgeLabel}>сегодня</span>
                      </div>
                      <button style={s.btnGhost} onClick={() => { setEditingHabit(true); setTempHabit(habitName); }}>сменить привычку</button>
                    </div>
                  )}
                </div>
              )}

              {visibleTab === "archive" && (
                <div>
                  {archive.length === 0 ? (
                    <div style={s.archiveEmpty}>Ты ещё не ответил ни на один вопрос.</div>
                  ) : (
                    archive.map((entry, i) => (
                      <div key={entry.date + i} style={i === archive.length - 1 ? {...s.archiveEntry, borderBottom: "none"} : s.archiveEntry}>
                        <div style={s.archiveDate}>
                          {new Date(entry.date).toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" })}
                        </div>
                        <div style={s.archiveQuestion}>{entry.question}</div>
                        <div style={s.archiveAnswer}>{entry.answer}</div>
                      </div>
                    ))
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    (function() {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = 192;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#111111";
      ctx.roundRect(0, 0, 192, 192, 32);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 110px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("?", 96, 100);
      document.getElementById("apple-touch-icon").href = canvas.toDataURL("image/png");
    })();

    if ("serviceWorker" in navigator) {
      const swCode = `
        const CACHE = "vopros-v2";
        self.addEventListener("install", e => { self.skipWaiting(); });
        self.addEventListener("activate", e => {
          e.waitUntil(caches.keys().then(keys =>
            Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
          ));
          self.clients.claim();
        });
        self.addEventListener("fetch", e => {
          e.respondWith(
            caches.open(CACHE).then(cache =>
              cache.match(e.request).then(cached => {
                const fetchPromise = fetch(e.request).then(r => { cache.put(e.request, r.clone()); return r; });
                return cached || fetchPromise;
              })
            )
          );
        });
      `;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type:"application/javascript"}))).catch(()=>{});
    }
  </script>

</body>
</html>
